<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mara Solis — Fullscreen</title>
<link rel="stylesheet" href="shared.css">
<style>
  html, body {
    height: 100%;
    overflow: hidden;
    background: #0F0E0C;
    cursor: none;
  }

  /* ── canvas stage ────────────────────────────────────────────── */
  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .view {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity .7s ease;
  }
  .view.active { opacity: 1; }

  .painting {
    max-width: 88vw;
    max-height: 82vh;
    /* actual w/h set by JS */
    flex-shrink: 0;
    box-shadow: 0 32px 80px rgba(0,0,0,.6);
  }

  /* ── nav chrome ──────────────────────────────────────────────── */
  .nav { color: #F0EDE6; }
  .nav .nav-right { color: #5A5648; }
  .nav .nav-right a:hover { color: #F0EDE6; }

  /* ── bottom info bar ─────────────────────────────────────────── */
  .info-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 2.4rem 2.5rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    pointer-events: none;
    background: linear-gradient(to top, rgba(12,10,8,.85) 0%, transparent 100%);
    opacity: 0;
    transition: opacity .4s ease;
  }
  .info-bar.visible { opacity: 1; }

  .info-title {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 1.3rem;
    color: #E8E4DC;
  }
  .info-detail {
    font-family: 'JetBrains Mono', monospace;
    font-size: .65rem;
    letter-spacing: .1em;
    color: #7A7468;
    margin-top: .3rem;
  }

  .counter {
    font-family: 'JetBrains Mono', monospace;
    font-size: .68rem;
    letter-spacing: .12em;
    color: #5A5648;
  }

  /* ── click zones ─────────────────────────────────────────────── */
  .zone {
    position: fixed;
    top: 0; bottom: 0;
    width: 50%;
    z-index: 50;
  }
  .zone-prev { left: 0; }
  .zone-next { right: 0; }

  /* ── custom cursor ───────────────────────────────────────────── */
  #cursor {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    transform: translate(-50%, -50%);
    width: 2.4rem;
    height: 2.4rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity .2s;
  }
  #cursor svg { width: 100%; height: 100%; }
  #cursor .arrow-left { display: none; }
  #cursor .arrow-right { display: block; }
  #cursor.prev-zone .arrow-left { display: block; }
  #cursor.prev-zone .arrow-right { display: none; }

  /* ── keyboard hint ───────────────────────────────────────────── */
  .hint {
    position: fixed;
    bottom: 7rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: .62rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #3A3830;
    opacity: 1;
    transition: opacity .6s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  .hint.gone { opacity: 0; }

  @media (hover: none) {
    body { cursor: auto; }
    #cursor { display: none; }
  }
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-name">Mara Solis</a>
  <div class="nav-right">
    <span class="nav-mode">03 — Fullscreen</span>
    <a href="index.html">← All modes</a>
  </div>
</nav>

<div class="stage" id="stage"></div>

<div class="zone zone-prev" id="zonePrev"></div>
<div class="zone zone-next" id="zoneNext"></div>

<div class="info-bar" id="infoBar">
  <div>
    <div class="info-title" id="infoTitle"></div>
    <div class="info-detail" id="infoDetail"></div>
  </div>
  <div class="counter" id="counter"></div>
</div>

<div class="hint" id="hint">← → arrow keys or click to navigate</div>

<div id="cursor">
  <svg class="arrow-right" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="16" cy="16" r="15" stroke="#F0EDE6" stroke-width="1"/>
    <line x1="10" y1="16" x2="22" y2="16" stroke="#F0EDE6" stroke-width="1.5"/>
    <polyline points="17,11 22,16 17,21" stroke="#F0EDE6" stroke-width="1.5" fill="none"/>
  </svg>
  <svg class="arrow-left" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="16" cy="16" r="15" stroke="#F0EDE6" stroke-width="1"/>
    <line x1="22" y1="16" x2="10" y2="16" stroke="#F0EDE6" stroke-width="1.5"/>
    <polyline points="15,11 10,16 15,21" stroke="#F0EDE6" stroke-width="1.5" fill="none"/>
  </svg>
</div>

<script src="paintings.js"></script>
<script>
  let current = 0;
  let infoTimeout;
  let hintGone = false;

  const stage    = document.getElementById('stage');
  const infoBar  = document.getElementById('infoBar');
  const infoTitle= document.getElementById('infoTitle');
  const infoDetail=document.getElementById('infoDetail');
  const counter  = document.getElementById('counter');
  const cursor   = document.getElementById('cursor');
  const hint     = document.getElementById('hint');
  const zonePrev = document.getElementById('zonePrev');
  const zoneNext = document.getElementById('zoneNext');

  // build painting elements
  function calcDimensions(ratio) {
    const [w, h] = ratio.split('/').map(Number);
    const ar = w / h;
    const maxW = window.innerWidth * .88;
    const maxH = window.innerHeight * .82;
    let pw = maxH * ar;
    let ph = maxH;
    if (pw > maxW) { pw = maxW; ph = maxW / ar; }
    return { pw, ph };
  }

  PAINTINGS.forEach((p, i) => {
    const { pw, ph } = calcDimensions(p.ratio);
    const view = document.createElement('div');
    view.className = 'view';
    view.dataset.index = i;
    view.innerHTML = `
      <div class="painting" style="
        width: ${pw}px;
        height: ${ph}px;
        background: ${p.bg};
      "></div>
    `;
    stage.appendChild(view);
  });

  const views = document.querySelectorAll('.view');

  function showInfo() {
    infoBar.classList.add('visible');
    clearTimeout(infoTimeout);
    infoTimeout = setTimeout(() => infoBar.classList.remove('visible'), 2800);
  }

  function goTo(idx, wrap = true) {
    if (!wrap && (idx < 0 || idx >= PAINTINGS.length)) return;
    current = ((idx % PAINTINGS.length) + PAINTINGS.length) % PAINTINGS.length;
    views.forEach((v, i) => v.classList.toggle('active', i === current));
    const p = PAINTINGS[current];
    infoTitle.textContent = p.title;
    infoDetail.textContent = `${p.year}  ·  ${p.medium}  ·  ${p.dimensions}`;
    counter.textContent = `${String(current + 1).padStart(2, '0')} / ${String(PAINTINGS.length).padStart(2, '0')}`;
    showInfo();
    if (!hintGone) { hint.classList.add('gone'); hintGone = true; }
  }

  goTo(0);

  zoneNext.addEventListener('click', () => goTo(current + 1));
  zonePrev.addEventListener('click', () => goTo(current - 1));

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(current - 1);
  });

  // custom cursor
  window.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
    cursor.classList.toggle('prev-zone', e.clientX < window.innerWidth / 2);
  });

  // cursor in prev zone
  zonePrev.addEventListener('mouseenter', () => cursor.classList.add('prev-zone'));
  zoneNext.addEventListener('mouseenter', () => cursor.classList.remove('prev-zone'));

  // recalculate on resize
  window.addEventListener('resize', () => {
    PAINTINGS.forEach((p, i) => {
      const { pw, ph } = calcDimensions(p.ratio);
      const painting = views[i].querySelector('.painting');
      painting.style.width  = pw + 'px';
      painting.style.height = ph + 'px';
    });
  });
</script>
</body>
</html>
