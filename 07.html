<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mattie Chernos</title>
<meta name="description" content="Paintings by Mattie Chernos.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23fff'/%3E%3Ccircle cx='16' cy='16' r='9' fill='none' stroke='%23111' stroke-width='2'/%3E%3C/svg%3E">
<style>
*{box-sizing:border-box}
html,body{margin:0}
body{background:#fff;color:#111;font:18px/1.4 -apple-system,'Helvetica Neue',Arial,sans-serif}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer;text-align:inherit}
img,svg{display:block}

header{display:grid;grid-template-columns:1fr auto 1fr;align-items:baseline;padding:22px 34px;gap:20px}
header a{white-space:nowrap}
header a[aria-current]{text-decoration:underline;text-underline-offset:4px}
.nav-l{justify-self:start}
.nav-c{justify-self:center}
.nav-r{justify-self:end}

main{padding:8px 34px 80px}
#work-view[hidden],#about-view[hidden],#contact-view[hidden]{display:none}

.grid{display:grid;grid-template-columns:repeat(4,1fr);column-gap:34px;row-gap:56px;align-items:start}
.gfig{margin:0}
.gfig .art{width:100%}
.gfig .art img,.gfig .art svg{width:100%;height:auto;display:block}

@media (max-width:1100px){ .grid{grid-template-columns:repeat(3,1fr)} }
@media (max-width:760px){ .grid{grid-template-columns:repeat(2,1fr);column-gap:20px;row-gap:38px} }
@media (max-width:480px){
  header{grid-template-columns:1fr;justify-items:start;gap:8px}
  .nav-c,.nav-r{justify-self:start}
  .grid{grid-template-columns:1fr}
}

.page{max-width:520px;padding:6vh 0 0}
.page p{margin:0 0 1.1em;font-size:17px;line-height:1.6}
.placeholder{color:#888}
.contact-line a{border-bottom:1px solid #ccc}
</style>
</head>
<body>

<header>
  <a class="nav-l" href="#work" data-nav="work" aria-current="page">Work</a>
  <a class="nav-c" href="#about" data-nav="about">About</a>
  <a class="nav-r" href="#contact" data-nav="contact">Contact</a>
</header>

<main>
  <section id="work-view" aria-label="Selected works">
    <div class="grid" id="grid"></div>
  </section>

  <section id="about-view" class="page" hidden>
    <p class="placeholder">(Bio to come: two or three short paragraphs about Mattie, the work, and the studio practice.)</p>
    <p class="placeholder">(A note on materials and process can sit here maybe)</p>
  </section>

  <section id="contact-view" class="page" hidden>
    <p class="contact-line"><a href="mailto:studio@mattiechernos.com">studio@mattiechernos.com</a></p>
    <p class="placeholder" style="margin-top:1.6em">Studio visits and inquiries welcome.</p>
  </section>
</main>

<script>
const WORKS = [
  {title:'Untitled (Dusk)',      year:2025, medium:'oil on linen',  dims:'36 × 48 in', src:'1.png'},
  {title:'Field IV',             year:2025, medium:'oil on canvas', dims:'40 × 30 in', src:'2.png'},
  {title:'Interior with Chair',  year:2024, medium:'oil on panel',  dims:'24 × 24 in', src:'3.png'},
  {title:'Still Water',          year:2024, medium:'oil on linen',  dims:'48 × 36 in', src:'4.png'},
  {title:'The Yellow Room',      year:2024, medium:'oil on canvas', dims:'30 × 40 in', src:'5.png'},
  {title:'Harbour, Evening',     year:2023, medium:'oil on linen',  dims:'60 × 40 in', src:'6.png'},
  {title:'Two Figures',          year:2023, medium:'oil on panel',  dims:'20 × 24 in', src:'7.png'},
  {title:'Study in Umber',       year:2023, medium:'oil on paper',  dims:'15 × 22 in', src:'8.png'},
  {title:'Late Snow',            year:2022, medium:'oil on canvas', dims:'36 × 36 in', src:'9.png'},
  {title:'Vessel',               year:2022, medium:'oil on linen',  dims:'28 × 34 in', src:'10.png'}
];

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
const PALETTES=[['#dcd6c8','#a8552f','#3f4a3c','#c9b47a'],['#e8e4da','#33506b','#b0b7ad','#8a3324'],
['#efe9df','#c67f43','#7d8ca3','#4a4238'],['#e5dfd2','#606c5a','#d1a05a','#2f2b26'],['#ece7de','#95542e','#c8bfae','#40556e']];

function paintingSVG(i,[aw,ah]){
  const rnd=mulberry32(11+i*97), pal=PALETTES[i%PALETTES.length];
  const w=900,h=Math.round(900*ah/aw),u='p'+i,hy=h*(.42+rnd()*.32);
  let s=`<rect x="0" y="${hy|0}" width="${w}" height="${(h-hy)|0}" fill="${pal[1]}" opacity="${(.82+rnd()*.18).toFixed(2)}"/>`;
  s+=`<ellipse cx="${(rnd()*w)|0}" cy="${(hy+(rnd()-.5)*h*.3)|0}" rx="${(w*(.16+rnd()*.26))|0}" ry="${(w*(.12+rnd()*.2))|0}" fill="${pal[2]}" opacity="${(.45+rnd()*.35).toFixed(2)}" filter="url(#b${u})"/>`;
  const k=rnd();
  if(k<.4)s+=`<rect x="${(w*.08)|0}" y="${(hy-(6+rnd()*40))|0}" width="${(w*.84)|0}" height="${(5+rnd()*11)|0}" fill="${pal[3]}" opacity=".9"/>`;
  else if(k<.75){const q=55+rnd()*110;s+=`<rect x="${(rnd()*(w-q))|0}" y="${(rnd()*(h-q)*.8)|0}" width="${q|0}" height="${q|0}" fill="${pal[3]}" opacity="${(.7+rnd()*.3).toFixed(2)}"/>`}
  else s+=`<rect x="${(w*(.15+rnd()*.6))|0}" y="0" width="${(7+rnd()*16)|0}" height="${h}" fill="${pal[3]}" opacity=".55"/>`;
  return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="placeholder">`+
    `<defs><filter id="b${u}" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="${(16+rnd()*22)|0}"/></filter>`+
    `<filter id="g${u}"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"/><feColorMatrix type="saturate" values="0"/></filter></defs>`+
    `<rect width="${w}" height="${h}" fill="${pal[0]}"/>${s}<rect width="${w}" height="${h}" filter="url(#g${u})" opacity="0.07"/></svg>`;
}

const $=s=>document.querySelector(s);
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function artFor(w,i){ return w.src ? `<img src="${esc(w.src)}" alt="${esc(w.title)}" loading="lazy">` : paintingSVG(i,w.aspect); }

$('#grid').innerHTML = WORKS.map((w,i)=>
  `<figure class="gfig" data-i="${i}">`+
  `<div class="art">${artFor(w,i)}</div>`+
  `</figure>`).join('');

/* ---- routing ---- */
const VIEWS={work:'#work-view',about:'#about-view',contact:'#contact-view'};
function route(){
  const page = (location.hash.replace('#','') in VIEWS) ? location.hash.replace('#','') : 'work';
  for(const k in VIEWS) $(VIEWS[k]).hidden=(k!==page);
  document.querySelectorAll('header a').forEach(a=>{
    if(a.dataset.nav===page)a.setAttribute('aria-current','page');else a.removeAttribute('aria-current');
  });
  window.scrollTo(0,0);
}
window.addEventListener('hashchange',route); route();
</script>
</body>
</html>
