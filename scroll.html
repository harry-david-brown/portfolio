<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mara Solis — Scroll</title>
<link rel="stylesheet" href="shared.css">
<style>
  body { padding-top: 5rem; }

  .lead {
    max-width: 52ch;
    padding: 4rem 2.5rem 6rem;
  }
  .lead h2 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-style: italic;
    font-size: clamp(1.8rem, 4vw, 3rem);
    line-height: 1.15;
    margin-bottom: 1.2rem;
  }
  .lead p {
    font-size: .95rem;
    line-height: 1.7;
    color: var(--stone);
  }

  /* ── works ──────────────────────────────────────────────────── */
  .works { padding-bottom: 10rem; }

  .work {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    padding: 0 0 10rem;
    opacity: 0;
    transform: translateY(48px);
    transition: opacity .9s cubic-bezier(.2,.7,.2,1), transform .9s cubic-bezier(.2,.7,.2,1);
  }
  .work.in { opacity: 1; transform: none; }

  /* alternate alignment: even works shift right */
  .work:nth-child(even) { direction: rtl; }
  .work:nth-child(even) > * { direction: ltr; }

  .work-frame {
    grid-column: 1;
    padding: 0 2.5rem;
  }

  .canvas {
    width: 100%;
    display: block;
  }

  .work-meta {
    grid-column: 2;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 2.5rem 0.5rem;
  }
  .work:nth-child(even) .work-meta {
    justify-content: flex-start;
    padding-top: 2rem;
  }

  .work-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: .65rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--stone);
    margin-bottom: .8rem;
  }
  .work-title {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(1.4rem, 2.5vw, 2rem);
    line-height: 1.1;
    margin-bottom: .8rem;
  }
  .work-detail {
    font-size: .85rem;
    color: var(--stone);
    line-height: 1.6;
  }
  .work-detail span { display: block; }

  /* ── footer ─────────────────────────────────────────────────── */
  .end {
    padding: 5rem 2.5rem;
    border-top: 1px solid var(--hairline);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 2rem;
  }
  .end h3 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: clamp(1.4rem, 3vw, 2rem);
    max-width: 18ch;
  }
  .end-contact {
    font-family: 'JetBrains Mono', monospace;
    font-size: .72rem;
    letter-spacing: .08em;
    color: var(--stone);
    text-align: right;
    display: flex;
    flex-direction: column;
    gap: .4rem;
  }

  @media (max-width: 780px) {
    .work {
      grid-template-columns: 1fr;
      padding-bottom: 5rem;
    }
    .work:nth-child(even) { direction: ltr; }
    .work-frame { padding: 0 1.2rem; }
    .work-meta { padding: 1.2rem 1.2rem 0; justify-content: flex-start !important; }
    .lead { padding: 3rem 1.2rem 4rem; }
    .end { padding: 3rem 1.2rem; flex-direction: column; align-items: flex-start; }
    .end-contact { text-align: left; }
  }
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-name">Mara Solis</a>
  <div class="nav-right">
    <span class="nav-mode">02 — Scroll</span>
    <a href="index.html">← All modes</a>
  </div>
</nav>

<div class="lead">
  <h2>Selected Works</h2>
  <p>Oil on linen and canvas, 2023–2026. Shown in the order they were made.</p>
</div>

<div class="works" id="works"></div>

<div class="end">
  <h3>Available for studio visits and gallery inquiries.</h3>
  <div class="end-contact">
    <span>hello@marasolis.com</span>
    <span>@mara.solis.studio</span>
    <span>Lisbon, PT</span>
  </div>
</div>

<script src="paintings.js"></script>
<script>
  const container = document.getElementById('works');

  PAINTINGS.forEach((p, i) => {
    const work = document.createElement('div');
    work.className = 'work';
    work.innerHTML = `
      <div class="work-frame">
        <div class="canvas" style="aspect-ratio: ${p.ratio}; background: ${p.bg};"></div>
      </div>
      <div class="work-meta">
        <div class="work-num">${String(i + 1).padStart(2, '0')} / ${String(PAINTINGS.length).padStart(2, '0')}</div>
        <div class="work-title">${p.title}</div>
        <div class="work-detail">
          <span>${p.year}</span>
          <span>${p.medium}</span>
          <span>${p.dimensions}</span>
        </div>
      </div>
    `;
    container.appendChild(work);
  });

  // scroll reveal
  const works = document.querySelectorAll('.work');
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
  }, { threshold: .15 });
  works.forEach(w => io.observe(w));
</script>
</body>
</html>
